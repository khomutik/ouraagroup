<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Группа АА — меню</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Шрифт по умолчанию (можно поменять после выбора на странице fonts.html) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Сейчас стоит Golos Text (очень читабелен по-русски). Можешь заменить на любой выбранный. -->
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Тёплая "бежевая" база */
      --bg: #f3eadf;      /* фон */
      --card: #fffaf3;    /* карточки */
      --text: #1f2937;
      --muted: rgba(31,41,55,.72);
      --border: rgba(31,41,55,.12);
      --shadow2: 0 6px 14px rgba(0,0,0,.08);

      --radius: 18px;
      --radius2: 16px;
      --gap: 12px;

      /* Крупнее шрифты (под "зрение не ахти") */
      --h1: 22px;
      --sub: 15px;
      --title: 18px;
      --hint: 15px;

      --font: "Golos Text", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      padding: 16px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    .wrap{ max-width: 560px; margin: 0 auto; }

    header{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      box-shadow: var(--shadow2);
      margin-bottom: 14px;
      background: var(--card);
    }

    h1{ font-size: var(--h1); margin: 0 0 6px; letter-spacing: -0.2px; }
    .sub{ margin:0; font-size: var(--sub); color: var(--muted); line-height: 1.35; }

    .grid{ display: grid; gap: var(--gap); }

    .btn{
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      background: var(--card);
      padding: 16px 14px;
      text-align: left;
      box-shadow: var(--shadow2);
      cursor: pointer;
      transition: transform .06s ease, box-shadow .12s ease;
    }
    .btn:active{ transform: translateY(1px); box-shadow: 0 4px 10px rgba(0,0,0,.10); }

    .row{ display:flex; align-items:flex-start; gap: 12px; }

    .icon{
      width: 44px; height: 44px;
      border-radius: 14px;
      background: rgba(120, 90, 50, .12);
      display:flex; align-items:center; justify-content:center;
      flex: 0 0 auto;
      border: 1px solid rgba(120, 90, 50, .16);
      font-size: 20px;
    }

    .title{ font-size: var(--title); font-weight: 800; margin: 0; line-height: 1.1; }
    .hint{ margin-top: 5px; font-size: var(--hint); font-weight: 650; color: var(--muted); line-height: 1.25; }

    .footer{
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Группа АА "Название группы"</h1>
      <p class="sub">Девиз группы (текст)</p>
    </header>

    <div class="grid">
      <button class="btn" onclick="openTelegram(CHAT_TME)">
        <div class="row">
          <div class="icon">💬</div>
          <div>
            <div class="title">Чат группы</div>
            <div class="hint">общий чат + текстовое сопровождение собрания</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openExternal(MEETING_LINK)">
        <div class="row">
          <div class="icon">🎧</div>
          <div>
            <div class="title">Подключиться к собранию</div>
            <div class="hint">собрание проходит в голосовом чате "Яндекс.Телемост"</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ANNOUNCEMENTS_TOPIC)">
        <div class="row">
          <div class="icon">📣</div>
          <div>
            <div class="title">Объявления</div>
            <div class="hint">важное и актуальное</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(NEWCOMERS_TOPIC)">
        <div class="row">
          <div class="icon">🧭</div>
          <div>
            <div class="title">Новичкам</div>
            <div class="hint">с чего начать + как проходит собрание</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(POLLS_TOPIC)">
        <div class="row">
          <div class="icon">🗳️</div>
          <div>
            <div class="title">Голосования</div>
            <div class="hint">актуальные опросы группы</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ARCHIVE_TOPIC)">
        <div class="row">
          <div class="icon">🗂️</div>
          <div>
            <div class="title">Архив</div>
            <div class="hint">протоколы Рабочих собраний + решения Группы</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(SERVANTS_LIST)">
        <div class="row">
          <div class="icon">👥</div>
          <div>
            <div class="title">Список служащих группы</div>
            <div class="hint">контакты + даты ротации + свободные служения</div>
          </div>
        </div>
      </button>
    </div>

    <div class="footer">Если что-то “подвисло”, закрой мини-апп и открой снова через бота (Телега любит кэш).</div>
  </div>

  <script>
    // === ССЫЛКИ ===
    const CHAT_TME     = "https://t.me/+IrdlX5oOJ-gxMGEy";
    const MEETING_LINK = "https://telemost.yandex.ru/j/30538613968161";

    const ANNOUNCEMENTS_TOPIC = "https://t.me/c/3835668674/1/5";
    const NEWCOMERS_TOPIC     = "https://t.me/c/3835668674/3/4";
    const ARCHIVE_TOPIC       = "https://t.me/c/3835668674/7/8";
    const POLLS_TOPIC         = "https://t.me/c/3835668674/9/10";
    const SERVANTS_LIST       = "https://t.me/c/3835668674/19/20"; // ✅ правильная

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      try { tg.expand(); } catch (e) {}
    }

    function openExternal(url) {
      if (!url) return;
      if (tg && tg.openLink) tg.openLink(url);
      else window.open(url, "_blank");
    }

    function openTelegram(url) {
      if (!url) return;
      try { if (tg && tg.openTelegramLink) return tg.openTelegramLink(url); } catch (e) {}
      try { if (tg && tg.openLink) return tg.openLink(url); } catch (e) {}
      window.location.href = url;
    }
  </script>
</body>
</html>
