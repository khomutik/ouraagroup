<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Группа АА — меню</title>

<link rel="manifest" href="/ouraagroup/manifest.webmanifest">
<meta name="theme-color" content="#2c4e67">
<link rel="apple-touch-icon" href="/ouraagroup/icons/apple-touch-icon.png">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Philosopher -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{

/* цвет текста как на "Квартирник" */
--ink:#142b44;

/* фон сине-голубой */
--bg1:#3a6f8f;
--bg2:#6fa0b7;
--bg3:#b9d3e0;

/* кнопки охра */
--btn1:#c46327;
--btn2:#e38a39;
--btn3:#9e4c1e;

--gold:#e7a54b;

--radius:18px;
--radius2:16px;

--shadow:0 10px 20px rgba(0,0,0,.15);

--font:"Philosopher", serif;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:14px;
font-family:var(--font);
color:var(--ink);

background:
linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
}

/* применяем шрифт ко всему */
body,button,input,textarea,.title,.hint,.pollBadge,.pollTitle,.pollUntil{
font-family:var(--font)!important;
}

.wrap{
max-width:560px;
margin:0 auto;
}

.logo{
width:100%;
height:120px;
object-fit:cover;
border-radius:18px;
margin-bottom:12px;
box-shadow:var(--shadow);
}

.grid{
display:grid;
gap:10px;
}

/* КНОПКИ */

.btn{

width:100%;
border:none;
border-radius:var(--radius2);

background:
linear-gradient(180deg,var(--btn2),var(--btn1));

color:#fff;

padding:14px;

box-shadow:var(--shadow);

cursor:pointer;
transition:.1s;
}

.btn:active{
transform:translateY(1px);
background:linear-gradient(180deg,var(--btn1),var(--btn3));
}

.row{
display:flex;
gap:12px;
align-items:flex-start;
}

.icon{
width:40px;
height:40px;

border-radius:12px;

background:rgba(255,255,255,.2);

display:flex;
align-items:center;
justify-content:center;

font-size:19px;
}

.title{
font-size:28px;
font-weight:700;
margin:0;
}

.hint{
margin-top:6px;
font-size:18px;
opacity:.9;
}

/* Плашка голосования */

.pollCard{

margin-bottom:12px;

background:rgba(255,255,255,.85);

border-radius:var(--radius);

padding:14px;

box-shadow:var(--shadow);
}

.pollTop{
display:flex;
flex-direction:column;
gap:6px;
margin-bottom:8px;
}

.pollBadge{

font-size:28px;
font-weight:700;

text-align:center;

padding:10px;

border-radius:12px;

background:linear-gradient(180deg,#ffe2b4,#f3b15a);
}

.pollUntil{

font-size:20px;

text-align:center;

color:var(--gold);

font-weight:700;
}

.pollTitle{
font-size:22px;
margin-bottom:12px;
}

.pollBtn{

width:100%;

border:none;

border-radius:var(--radius2);

background:
linear-gradient(180deg,var(--btn2),var(--btn1));

color:#fff;

padding:16px;

font-size:22px;

font-weight:700;

text-align:center;

cursor:pointer;

box-shadow:var(--shadow);
}

.pollBtn:active{
background:linear-gradient(180deg,var(--btn1),var(--btn3));
}

.footer{
margin-top:14px;
text-align:center;
font-size:16px;
opacity:.8;
}

</style>
</head>

<body>

<div class="wrap">

<img class="logo" src="./logo.png.png" alt='Группа АА "Квартирник"'>

<div id="pollCard" class="pollCard" style="display:none">

<div class="pollTop">

<div class="pollBadge">🗳 ИДЕТ ГОЛОСОВАНИЕ</div>

<div id="pollUntil" class="pollUntil"></div>

</div>

<div id="pollTitle" class="pollTitle"></div>

<button class="pollBtn" id="pollOpenBtn">
ПРОГОЛОСОВАТЬ
</button>

</div>

<div class="grid">

<button class="btn" onclick="openTelegram(CHAT_TME)">
<div class="row">
<div class="icon">💬</div>
<div>
<div class="title">Чат группы</div>
<div class="hint">общий чат + текстовое сопровождение собрания</div>
</div>
</div>
</button>

<button class="btn" onclick="openExternal(MEETING_LINK)">
<div class="row">
<div class="icon">🎧</div>
<div>
<div class="title">Подключиться к собранию</div>
<div class="hint">собрание проходит в голосовом чате Яндекс.Телемост</div>
</div>
</div>
</button>

<button class="btn" onclick="openTelegram(ANNOUNCEMENTS_TOPIC)">
<div class="row">
<div class="icon">📣</div>
<div>
<div class="title">Объявления</div>
<div class="hint">важное и актуальное</div>
</div>
</div>
</button>

<button class="btn" onclick="openTelegram(NEWCOMERS_TOPIC)">
<div class="row">
<div class="icon">🧭</div>
<div>
<div class="title">Новичкам</div>
<div class="hint">с чего начать + как проходит собрание</div>
</div>
</div>
</button>

<button class="btn" onclick="openTelegram(SERVANTS_LIST)">
<div class="row">
<div class="icon">👥</div>
<div>
<div class="title">Список служащих</div>
<div class="hint">контакты + даты ротации + свободные служения</div>
</div>
</div>
</button>

<button class="btn" onclick="openTelegram(POLLS_TOPIC)">
<div class="row">
<div class="icon">🗳</div>
<div>
<div class="title">Голосования</div>
<div class="hint">актуальные опросы группы</div>
</div>
</div>
</button>

<button class="btn" onclick="openTelegram(ARCHIVE_TOPIC)">
<div class="row">
<div class="icon">🗂</div>
<div>
<div class="title">Архив</div>
<div class="hint">протоколы рабочих собраний + решения группы</div>
</div>
</div>
</button>

</div>

<div class="footer">
Если что-то зависло — закрой меню и открой снова через бота.
</div>

</div>

<script>

const CHAT_TME="https://t.me/+IrdlX5oOJ-gxMGEy"
const MEETING_LINK="https://telemost.yandex.ru/j/30538613968161"

const ANNOUNCEMENTS_TOPIC="https://t.me/c/3835668674/1/5"
const NEWCOMERS_TOPIC="https://t.me/c/3835668674/3/4"
const ARCHIVE_TOPIC="https://t.me/c/3835668674/7/8"
const POLLS_TOPIC="https://t.me/c/3835668674/9/10"
const SERVANTS_LIST="https://t.me/c/3835668674/19/20"

const tg=window.Telegram?.WebApp
if(tg){
tg.ready()
try{tg.expand()}catch(e){}
}

function openExternal(url){
if(!url)return
if(tg&&tg.openLink)tg.openLink(url)
else window.open(url,"_blank")
}

function openTelegram(url){
if(!url)return
try{if(tg&&tg.openTelegramLink)return tg.openTelegramLink(url)}catch(e){}
try{if(tg&&tg.openLink)return tg.openLink(url)}catch(e){}
window.location.href=url
}

if("serviceWorker"in navigator){
navigator.serviceWorker.register("/ouraagroup/sw.js")
}

(async function loadPollStatus(){

try{

const res=await fetch("./status.json?v="+Date.now(),{cache:"no-store"})
const s=await res.json()

if(!s||!s.polls_active||!s.polls_url)return

const card=document.getElementById("pollCard")
const title=document.getElementById("pollTitle")
const until=document.getElementById("pollUntil")
const btn=document.getElementById("pollOpenBtn")

title.textContent=s.polls_title||"Новое голосование"
until.textContent=s.polls_until?("до "+s.polls_until):""

btn.onclick=()=>openTelegram(s.polls_url)

card.style.display="block"

}catch(e){}

})()

</script>

</body>
</html>
