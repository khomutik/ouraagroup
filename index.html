<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Группа АА — меню</title>

  <link rel="manifest" href="/ouraagroup/manifest.webmanifest">
  <meta name="theme-color" content="#F3E6D7">
  <link rel="apple-touch-icon" href="/ouraagroup/icons/apple-touch-icon.png">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Neucha (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">

  <style>
    :root{
      /* фон и карточки — тёплый “песок/пергамент” */
      --bg:    #F3E6D7;   /* фон страницы */
      --card:  #FBF1E4;   /* подложки карточек */
      --card2: #FBF1E4;

      /* чернила из картинки */
      --ink:   #151B2B;   /* основной текст */
      --text:  var(--ink);
      --muted: rgba(21,27,43,.62);

      /* золото/охра из картинки */
      --gold:  #D8A23A;
      --gold2: #F0C45A;

      /* зелёный “действие”, спокойнее */
      --accent:  #3F9E57;
      --accent2: #2F7F44; /* при нажатии */

      /* рамки и тени — мягче, теплее */
      --border: rgba(21,27,43,.14);
      --shadow2: 0 10px 22px rgba(21,27,43,.10);

      --radius: 18px;
      --radius2: 16px;
      --gap: 10px;

      /* ВСЁ ТЕКСТОВОЕ — Neucha */
      --font: "Neucha", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      padding: 14px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    /* ЖЕЛЕЗОБЕТОННО: всё текстовое — Neucha */
    body, button, input, textarea, select,
    .title, .hint, .pollBadge, .pollTitle, .pollUntil, .footer, h1, .btn, .pollBtn {
      font-family: var(--font) !important;
    }

    .wrap{ max-width: 560px; margin: 0 auto; }

    /* Шапка с логотипом */
    .topbar{
      padding: 0;
      margin-bottom: 12px;
    }

    .logo{
      width: 100%;
      height: 120px;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 18px;
      box-shadow: var(--shadow2);
      border: 1px solid rgba(216,162,58,.22);
    }

    .grid{ display: grid; gap: var(--gap); }

    .btn{
      width: 100%;
      border: 1px solid rgba(216,162,58,.22); /* тёплая золотая рамка */
      border-radius: var(--radius2);
      background: var(--card);
      padding: 12px 12px;
      text-align: left;
      box-shadow: var(--shadow2);
      cursor: pointer;
      transition: transform .06s ease, box-shadow .12s ease;
    }
    .btn:active{
      transform: translateY(1px);
      box-shadow: 0 6px 14px rgba(21,27,43,.14);
    }

    .row{ display:flex; align-items:flex-start; gap: 10px; }

    .icon{
      width: 40px; height: 40px;
      border-radius: 14px;
      background: rgba(216,162,58,.18);
      display:flex; align-items:center; justify-content:center;
      flex: 0 0 auto;
      border: 1px solid rgba(21,27,43,.12);
      font-size: 19px;
      margin-top: 2px;
    }

    /* Тексты карточек */
    .title{
      font-size: 26px;
      font-weight: 900;
      margin: 0;
      line-height: 1.05;
      letter-spacing: .2px;
      text-transform: uppercase;
      color: var(--ink);
    }

    .hint{
      margin-top: 6px;
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.25;
      letter-spacing: .1px;
    }

    .footer{
      margin-top: 12px;
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: .1px;
    }

    /* Плашка голосования */
    .pollCard{
      margin: 0 0 12px;
      padding: 12px;
      border: 1px solid rgba(216,162,58,.22);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow2);
    }

    /* делаем вертикально и растягиваем на всю ширину */
    .pollTop{
      display:flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* "ИДЁТ ГОЛОСОВАНИЕ" — как кнопка (золотая) */
    .pollBadge{
      width: 100%;
      text-align: center;

      padding: 14px 12px;
      border-radius: var(--radius2);
      border: 1px solid rgba(216,162,58,.35);
      background: linear-gradient(180deg, rgba(240,196,90,.28), rgba(216,162,58,.18));
      color: var(--ink);

      font-size: 20px;
      font-weight: 900;
      letter-spacing: .3px;
      text-transform: uppercase;
      white-space: normal;
    }

    /* дата — крупно и жирно */
    .pollUntil{
      width: 100%;
      text-align: center;

      font-size: 20px;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: .2px;

      white-space: normal;
    }

    .pollTitle{
      font-size: 22px;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 10px;
      letter-spacing: .1px;
      color: var(--ink);
    }

    /* кнопка — зелёная “мшистая”, в общей гамме */
    .pollBtn{
      width: 100%;
      border: none;
      border-radius: var(--radius2);
      background: var(--accent);
      color: #ffffff;

      padding: 16px 12px;

      font-weight: 900;
      font-size: 22px;
      letter-spacing: .3px;
      text-transform: uppercase;

      cursor: pointer;
      box-shadow: var(--shadow2);
    }

    .pollBtn:active{
      transform: translateY(1px);
      background: var(--accent2);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="topbar">
      <img class="logo" src="./logo.png.png" alt='Группа АА "Квартирник"'>
    </header>

    <!-- Плашка активного голосования -->
    <div id="pollCard" class="pollCard" style="display:none;">
      <div class="pollTop">
        <div class="pollBadge">🗳️ ИДЁТ ГОЛОСОВАНИЕ</div>
        <div id="pollUntil" class="pollUntil"></div>
      </div>
      <div id="pollTitle" class="pollTitle"></div>
      <button class="pollBtn" id="pollOpenBtn">Проголосовать</button>
    </div>

    <div class="grid">
      <button class="btn" onclick="openTelegram(CHAT_TME)">
        <div class="row">
          <div class="icon">💬</div>
          <div>
            <div class="title">Чат группы</div>
            <div class="hint">общий чат + текстовое сопровождение собрания</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openExternal(MEETING_LINK)">
        <div class="row">
          <div class="icon">🎧</div>
          <div>
            <div class="title">Подключиться к собранию</div>
            <div class="hint">собрание проходит в голосовом чате "Яндекс.Телемост"</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ANNOUNCEMENTS_TOPIC)">
        <div class="row">
          <div class="icon">📣</div>
          <div>
            <div class="title">Объявления</div>
            <div class="hint">важное и актуальное</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(NEWCOMERS_TOPIC)">
        <div class="row">
          <div class="icon">🧭</div>
          <div>
            <div class="title">Новичкам</div>
            <div class="hint">с чего начать + как проходит собрание</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(SERVANTS_LIST)">
        <div class="row">
          <div class="icon">👥</div>
          <div>
            <div class="title">Список служащих</div>
            <div class="hint">контакты + даты ротации + свободные служения</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(POLLS_TOPIC)">
        <div class="row">
          <div class="icon">🗳️</div>
          <div>
            <div class="title">Голосования</div>
            <div class="hint">актуальные опросы группы</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ARCHIVE_TOPIC)">
        <div class="row">
          <div class="icon">🗂️</div>
          <div>
            <div class="title">Архив</div>
            <div class="hint">протоколы Рабочих собраний + решения Группы</div>
          </div>
        </div>
      </button>
    </div>

    <div class="footer">Если что-то “подвисло” — закрой меню и открой снова через бота.</div>
  </div>

  <script>
    const CHAT_TME     = "https://t.me/+IrdlX5oOJ-gxMGEy";
    const MEETING_LINK = "https://telemost.yandex.ru/j/30538613968161";

    const ANNOUNCEMENTS_TOPIC = "https://t.me/c/3835668674/1/5";
    const NEWCOMERS_TOPIC     = "https://t.me/c/3835668674/3/4";
    const ARCHIVE_TOPIC       = "https://t.me/c/3835668674/7/8";
    const POLLS_TOPIC         = "https://t.me/c/3835668674/9/10";
    const SERVANTS_LIST       = "https://t.me/c/3835668674/19/20";

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      try { tg.expand(); } catch (e) {}
    }

    function openExternal(url) {
      if (!url) return;
      if (tg && tg.openLink) tg.openLink(url);
      else window.open(url, "_blank");
    }

    function openTelegram(url) {
      if (!url) return;
      try { if (tg && tg.openTelegramLink) return tg.openTelegramLink(url); } catch (e) {}
      try { if (tg && tg.openLink) return tg.openLink(url); } catch (e) {}
      window.location.href = url;
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/ouraagroup/sw.js");
    }

    // Проверяем, есть ли активное голосование
    (async function loadPollStatus(){
      try {
        const res = await fetch("./status.json?v=" + Date.now(), { cache: "no-store" });
        const s = await res.json();

        if (!s || !s.polls_active || !s.polls_url) return;

        const card  = document.getElementById("pollCard");
        const title = document.getElementById("pollTitle");
        const until = document.getElementById("pollUntil");
        const btn   = document.getElementById("pollOpenBtn");

        title.textContent = s.polls_title || "Новое голосование";
        until.textContent = s.polls_until ? ("до " + s.polls_until) : "";

        btn.onclick = () => openTelegram(s.polls_url);
        card.style.display = "block";
      } catch (e) {
        // молча: если статус не прочитался — просто не показываем плашку
      }
    })();
  </script>
</body>
</html>
