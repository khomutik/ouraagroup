<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Оура АА — меню</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 16px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .sub { font-size: 13px; opacity: .75; margin: 0 0 14px; line-height: 1.35; }
    .grid { display: grid; gap: 12px; }
    .btn {
      display: block; width: 100%;
      padding: 16px 14px;
      font-size: 16px; font-weight: 700;
      border-radius: 14px; border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      text-align: left;
    }
    .hint { font-size: 13px; opacity: .7; margin-top: 3px; font-weight: 600; }
  </style>
</head>

<body>
  <h1>Оура АА — быстрое меню</h1>
  <p class="sub">Ткнул — и ты там.</p>

  <div class="grid">
    <button class="btn" onclick="openTelegram(CHAT_TME)">
      Чат группы
      <div class="hint">общий чат + текстовое сопровождение собрания</div>
    </button>

    <button class="btn" onclick="openExternal(MEETING_LINK)">
      Подключиться к собранию
      <div class="hint">собрание проходит в голосовом чате &quot;Яндекс.Телемост&quot;</div>
    </button>

    <button class="btn" onclick="openTelegram(ANNOUNCEMENTS_TOPIC)">
      Объявления
      <div class="hint">важное и актуальное</div>
    </button>

    <button class="btn" onclick="openTelegram(NEWCOMERS_TOPIC)">
      Новичкам
      <div class="hint">с чего начать + как проходит собрание</div>
    </button>

    <button class="btn" onclick="openTelegram(ARCHIVE_TOPIC)">
      Архив
      <div class="hint">протоколы РС + голосования + решения ГС</div>
    </button>

    <button class="btn" onclick="openTelegram(POLLS_TOPIC)">
      Голосования
      <div class="hint">актуальные опросы группы</div>
    </button>
  </div>

  <script>
    // === ССЫЛКИ ===
    const CHAT_TME     = "https://t.me/+IrdlX5oOJ-gxMGEy";
    const MEETING_LINK = "https://telemost.yandex.ru/j/30538613968161";

    // Форум-темы (инфо-группа)
    const ANNOUNCEMENTS_TOPIC = "https://t.me/c/3835668674/1/5";
    const NEWCOMERS_TOPIC     = "https://t.me/c/3835668674/3/4";
    const ARCHIVE_TOPIC       = "https://t.me/c/3835668674/7/8";
    const POLLS_TOPIC         = "https://t.me/c/3835668674/9/10";

    // === СЛУЖЕБНОЕ ===
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      try { tg.expand(); } catch (e) {}
    }

    function openExternal(url) {
      if (!url) return;
      if (tg && tg.openLink) tg.openLink(url);
      else window.open(url, "_blank");
    }

    // Фолбэк на случай капризов: openTelegramLink -> openLink -> location.href
    function openTelegram(url) {
      if (!url) return;
      try {
        if (tg && tg.openTelegramLink) return tg.openTelegramLink(url);
      } catch (e) {}
      try {
        if (tg && tg.openLink) return tg.openLink(url);
      } catch (e) {}
      window.location.href = url;
    }
  </script>
</body>
</html>
