<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Группа АА — меню</title>

<link rel="manifest" href="/ouraagroup/manifest.webmanifest">
<meta name="theme-color" content="#f3eadf">
<link rel="apple-touch-icon" href="/ouraagroup/icons/apple-touch-icon.png">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #f3eadf;
      --card: #fffaf3;
      --text: #1f2937;
      --muted: rgba(31,41,55,.74);
      --border: rgba(31,41,55,.14);
      --shadow2: 0 6px 14px rgba(0,0,0,.08);

      --radius: 18px;
      --radius2: 16px;
      --gap: 10px;

      --h1: 22px;
      --sub: 15px;

      --title: 20px;
      --hint: 15px;

      --font: "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      padding: 14px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    .wrap{ max-width: 560px; margin: 0 auto; }

    header{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 12px 11px;
      box-shadow: var(--shadow2);
      margin-bottom: 12px;
      background: var(--card);
    }

    /* ✅ Заголовок: жирный + подчёркнут линией */
    h1{
      font-size: var(--h1);
      margin: 0 0 8px;
      letter-spacing: .9px;
      font-weight: 900;           /* жирнее */
      text-transform: uppercase;
      display: inline-block;      /* чтобы линия была по ширине текста */
      padding-bottom: 6px;
      border-bottom: 3px solid rgba(31,41,55,.55); /* подчёркивание */
    }

    .sub{ margin:0; font-size: var(--sub); color: var(--muted); line-height: 1.35; font-weight: 650; }

    .grid{ display: grid; gap: var(--gap); }

    .btn{
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      background: var(--card);
      padding: 12px 12px;
      text-align: left;
      box-shadow: var(--shadow2);
      cursor: pointer;
      transition: transform .06s ease, box-shadow .12s ease;
    }
    .btn:active{ transform: translateY(1px); box-shadow: 0 4px 10px rgba(0,0,0,.10); }

    .row{ display:flex; align-items:flex-start; gap: 10px; }

    .icon{
      width: 40px; height: 40px;
      border-radius: 14px;
      background: rgba(120, 90, 50, .12);
      display:flex; align-items:center; justify-content:center;
      flex: 0 0 auto;
      border: 1px solid rgba(120, 90, 50, .16);
      font-size: 19px;
      margin-top: 1px;
    }

    .title{
      font-size: var(--title);
      font-weight: 900;
      margin: 0;
      line-height: 1.05;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .hint{
      margin-top: 4px;
      font-size: var(--hint);
      font-weight: 650;
      color: var(--muted);
      line-height: 1.25;
    }

    .footer{
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      font-weight: 650;
    }

    /* ✅ Плашка голосования */
.pollCard{
  margin: 0 0 12px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: var(--shadow2);
}

.pollTop{
  display:flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.pollBadge{
  font-weight: 900;
  letter-spacing: .6px;
  text-transform: uppercase;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(31,41,55,.18);
  background: rgba(31,41,55,.06);
}

.pollUntil{
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
}

.pollTitle{
  font-size: 16px;
  font-weight: 800;
  line-height: 1.25;
  margin-bottom: 10px;
}

.pollBtn{
  width: 100%;
  border: none;
  border-radius: var(--radius2);
  background: #4CAF50; /* зелёная кнопка */
  color: #ffffff;
  padding: 12px 12px;
  font-weight: 900;
  letter-spacing: .6px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: var(--shadow2);
}

.pollBtn:active{
  transform: translateY(1px);
  background: #43a047; /* чуть темнее при нажатии */
}
.pollBtn:active{ transform: translateY(1px); }
  
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>ГРУППА АА "НАЗВАНИЕ"</h1>
      <p class="sub">Девиз группы (текст)</p>
    </header>

    <!-- ✅ Плашка активного голосования -->
<div id="pollCard" class="pollCard" style="display:none;">
  <div class="pollTop">
    <div class="pollBadge">🗳️ ИДЁТ ГОЛОСОВАНИЕ</div>
    <div id="pollUntil" class="pollUntil"></div>
  </div>
  <div id="pollTitle" class="pollTitle"></div>
  <button class="pollBtn" id="pollOpenBtn">Открыть опрос</button>
</div>

    <div class="grid">
      <button class="btn" onclick="openTelegram(CHAT_TME)">
        <div class="row">
          <div class="icon">💬</div>
          <div>
            <div class="title">Чат группы</div>
            <div class="hint">общий чат + текстовое сопровождение собрания</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openExternal(MEETING_LINK)">
        <div class="row">
          <div class="icon">🎧</div>
          <div>
            <div class="title">Подключиться к собранию</div>
            <div class="hint">собрание проходит в голосовом чате "Яндекс.Телемост"</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ANNOUNCEMENTS_TOPIC)">
        <div class="row">
          <div class="icon">📣</div>
          <div>
            <div class="title">Объявления</div>
            <div class="hint">важное и актуальное</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(NEWCOMERS_TOPIC)">
        <div class="row">
          <div class="icon">🧭</div>
          <div>
            <div class="title">Новичкам</div>
            <div class="hint">с чего начать + как проходит собрание</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(SERVANTS_LIST)">
        <div class="row">
          <div class="icon">👥</div>
          <div>
            <div class="title">Список служащих</div>
            <div class="hint">контакты + даты ротации + свободные служения</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(POLLS_TOPIC)">
        <div class="row">
          <div class="icon">🗳️</div>
          <div>
            <div class="title">Голосования</div>
            <div class="hint">актуальные опросы группы</div>
          </div>
        </div>
      </button>

      <button class="btn" onclick="openTelegram(ARCHIVE_TOPIC)">
        <div class="row">
          <div class="icon">🗂️</div>
          <div>
            <div class="title">Архив</div>
            <div class="hint">протоколы Рабочих собраний + решения Группы</div>
          </div>
        </div>
      </button>
    </div>

    <div class="footer">Если что-то “подвисло” — закрой меню и открой снова через бота.</div>
  </div>

  <script>
    const CHAT_TME     = "https://t.me/+IrdlX5oOJ-gxMGEy";
    const MEETING_LINK = "https://telemost.yandex.ru/j/30538613968161";

    const ANNOUNCEMENTS_TOPIC = "https://t.me/c/3835668674/1/5";
    const NEWCOMERS_TOPIC     = "https://t.me/c/3835668674/3/4";
    const ARCHIVE_TOPIC       = "https://t.me/c/3835668674/7/8";
    const POLLS_TOPIC         = "https://t.me/c/3835668674/9/10";
    const SERVANTS_LIST       = "https://t.me/c/3835668674/19/20";

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      try { tg.expand(); } catch (e) {}
    }

    function openExternal(url) {
      if (!url) return;
      if (tg && tg.openLink) tg.openLink(url);
      else window.open(url, "_blank");
    }

    function openTelegram(url) {
      if (!url) return;
      try { if (tg && tg.openTelegramLink) return tg.openTelegramLink(url); } catch (e) {}
      try { if (tg && tg.openLink) return tg.openLink(url); } catch (e) {}
      window.location.href = url;
    }
  </script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/ouraagroup/sw.js");
  }

// ✅ Проверяем, есть ли активное голосование
(async function loadPollStatus(){
  try {
    const res = await fetch("./status.json?v=" + Date.now(), { cache: "no-store" });
    const s = await res.json();

    if (!s || !s.polls_active || !s.polls_url) return;

    const card = document.getElementById("pollCard");
    const title = document.getElementById("pollTitle");
    const until = document.getElementById("pollUntil");
    const btn = document.getElementById("pollOpenBtn");

    title.textContent = s.polls_title || "Новое голосование";
    until.textContent = s.polls_until ? ("до " + s.polls_until) : "";

    btn.onclick = () => openTelegram(s.polls_url);

    card.style.display = "block";
  } catch (e) {
    // молча: если статус не прочитался — просто не показываем плашку
  }
})();
</script>
  
</body>
</html>
